<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Portal | Chess Uganda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Define the repeating chessboard background */
        body {
            /* You can generate or find a small tiling chessboard image. 
               This is a placeholder URL for a subtle, tiling pattern. */
            background-image: url('https://img.cryptokitties.co/0x06012c8cf97bead5deae237070f9587f8e7a266d/1489115.png'); /* Replace with your actual chessboard pattern URL */
            background-repeat: repeat;
            background-size: 100px 100px; /* Adjust size based on your pattern */
            color: #eee;
            position: relative;
        }

        /* Add a subtle overlay to make the content readable over the background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(18, 18, 18, 0.85); /* Semi-transparent dark overlay */
            z-index: -1; /* Place behind all content */
        }

        .gold-accent { color: #c5a059; }
        .bg-card { background: #1e1e1e; border: 1px solid #333; }
        .input-field { background: #111; border: 1px solid #444; border-radius: 8px; padding: 12px; width: 100%; outline: none; }
        .input-field:focus { border-color: #c5a059; }
    </style>
</head>
<body class="p-4 md:p-10 relative">

    <div class="max-w-5xl mx-auto z-10 relative">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-widest">Coach <span class="gold-accent">Dashboard</span></h1>
                <p class="text-gray-500 text-sm">Update your public profile for students in Uganda.</p>
            </div>
            <i class="fas fa-chess-queen text-4xl gold-accent"></i>
        </header>

        <form action="/admin" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6">
                <div class="bg-card p-6 rounded-xl text-center">
                    <div class="relative w-32 h-32 mx-auto mb-4 group border-2 border-dashed border-gray-600 rounded-full flex items-center justify-center overflow-hidden">
                        {% if coach.photo == 'default_avatar.png' %}
                            <i class="fas fa-user text-4xl text-gray-600"></i>
                        {% else %}
                            <img src="/static/uploads/{{ coach.photo }}" class="object-cover w-full h-full">
                        {% endif %}
                        <input type="file" name="photo" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <p class="text-xs text-gray-500 mb-4">Click circle to upload photo</p>
                    
                    <label class="block text-left text-xs font-bold text-gray-400 uppercase">Training Fee (e.g. 30k/hr)</label>
                    <input type="text" name="pricing" value="{{ coach.pricing }}" placeholder="Enter rate" class="input-field mt-1">
                </div>
            </div>

            <div class="lg:col-span-2 bg-card p-8 rounded-xl space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Full Name</label>
                        <input type="text" name="name" value="{{ coach.name }}" placeholder="Your Name" class="input-field mt-1">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Location (City/District)</label>
                        <input type="text" name="location" value="{{ coach.location }}" placeholder="e.g. Gulu, Wakiso" class="input-field mt-1">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Contact Info</label>
                        <input type="text" name="contact" value="{{ coach.contact }}" placeholder="WhatsApp or Email" class="input-field mt-1">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Chess Title</label>
                        <input type="text" name="titles" value="{{ coach.titles }}" placeholder="e.g. National Master, Coach, etc." class="input-field mt-1">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">About You (Biography)</label>
