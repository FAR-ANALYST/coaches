<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coach Admin | Chess Uganda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('https://i.ebayimg.com/images/g/Ijyc9oAAOSw~f9m~o~U/s-l1600.jpg');
            background-size: cover; background-attachment: fixed;
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: -1;
        }
        .glass { background: rgba(30,30,30,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-gray-200 p-6 md:p-12 relative">
    <div class="max-w-5xl mx-auto relative z-10">
        <form action="/admin" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="glass p-6 rounded-2xl text-center">
                    <div class="w-32 h-32 mx-auto mb-4 border-2 border-[#c5a059] rounded-xl overflow-hidden">
                        {% if coach.photo %}
                        <img src="/static/uploads/{{ coach.photo }}" class="w-full h-full object-cover">
                        {% else %}
                        <div class="h-full w-full flex items-center justify-center bg-gray-800"><i class="fas fa-user text-4xl"></i></div>
                        {% endif %}
                    </div>
                    <input type="file" name="photo" class="text-xs mb-4">
                    
                    <label class="block text-left text-[10px] uppercase text-gray-400 font-bold mb-1">Live Game Embed URL</label>
                    <input type="text" name="live_game_url" value="{{ game_url }}" placeholder="Paste Lichess/Chess.com link" class="w-full bg-black/50 border border-gray-700 p-2 rounded text-xs">
                </div>
            </div>

            <div class="lg:col-span-2 glass p-8 rounded-2xl space-y-6">
                <h2 class="text-2xl font-black uppercase tracking-tight">System <span class="text-[#c5a059]">Dashboard</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="name" value="{{ coach.name }}" placeholder="Full Name" class="bg-black/40 border border-gray-700 p-3 rounded">
                    <input type="text" name="location" value="{{ coach.location }}" placeholder="District" class="bg-black/40 border border-gray-700 p-3 rounded">
                    <input type="text" name="titles" value="{{ coach.titles }}" placeholder="Chess Title" class="bg-black/40 border border-gray-700 p-3 rounded">
                    <input type="text" name="pricing" value="{{ coach.pricing }}" placeholder="e.g. 50k/hour" class="bg-black/40 border border-gray-700 p-3 rounded">
                </div>
                <textarea name="bio" rows="4" placeholder="Professional Bio..." class="w-full bg-black/40 border border-gray-700 p-3 rounded">{{ coach.bio }}</textarea>
                <button type="submit" class="w-full bg-[#c5a059] text-black font-bold py-4 rounded hover:bg-yellow-600 transition uppercase tracking-widest">Update All Sections</button>
            </div>
        </form>
    </div>
</body>
</html>
